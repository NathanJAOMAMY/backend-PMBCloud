version: '3.8'

services:

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: pmbcloud-backend
    ports:
      - "3001:3001"
    volumes:
      - ./src/uploads:/app/src/uploads

    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost:8080,http://frontend:8080
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: unless-stopped
    networks:
      - pmbcloud-shared-network
    env_file:
      - .env


networks:
  pmbcloud-shared-network:
    external: true
    name: pmbcloud-shared-network 