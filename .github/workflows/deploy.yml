
name: Deploy Backend

on:
  workflow_run:
    workflows: ["Node.js CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (Render) — only after CI success
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || github.event_name == 'workflow_dispatch' }}
    env:
      RENDER_BACKEND_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Render credentials
        run: |
          if [ -z "$RENDER_BACKEND_SERVICE_ID" ]; then
            echo " Missing RENDER_BACKEND_SERVICE_ID secret"
            exit 1
          fi
          if [ -z "$RENDER_API_KEY" ]; then
            echo " Missing RENDER_API_KEY secret"
            exit 1
          fi
          echo "✓ Render credentials configured"

      - name: Trigger deploy via Render API
        id: trigger
        run: |
          echo "Triggering deployment on Render for service $RENDER_BACKEND_SERVICE_ID..."
          curl -s -X POST "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' -w "\n%{http_code}" > full_response.txt 2>&1
          
          # Extract HTTP code (last line) and response body (all lines except last)
          HTTP_CODE=$(tail -1 full_response.txt)
          RESPONSE=$(head -n -1 full_response.txt)
          
          echo "HTTP Status Code: $HTTP_CODE"
          echo "API Response Length: ${#RESPONSE}"
          echo "API Response: $RESPONSE"
          
          # Accept 200, 201, or 202 (Accepted)
          if ! [[ "$HTTP_CODE" =~ ^(200|201|202)$ ]]; then
            echo " Failed to trigger deployment. HTTP $HTTP_CODE. Response: $RESPONSE"
            exit 1
          fi
          
          # Try to extract DEPLOY_ID from response
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // .deploy.id // empty' 2>/dev/null)
          
          # If response is empty or missing DEPLOY_ID, fetch the most recent deploy
          if [ -z "$DEPLOY_ID" ] || [ -z "$RESPONSE" ]; then
            echo " Response was empty or missing ID; fetching most recent deploy..."
            RECENT_DEPLOYS=$(curl -s "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys?limit=1" \
              -H "Authorization: Bearer $RENDER_API_KEY")
            DEPLOY_ID=$(echo "$RECENT_DEPLOYS" | jq -r '.[0].deploy.id // empty' 2>/dev/null)
            if [ -z "$DEPLOY_ID" ]; then
              echo " Failed to fetch recent deploy ID. Response: $RECENT_DEPLOYS"
              exit 1
            fi
          fi
          
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
          echo "Triggered deploy id: $DEPLOY_ID"

      - name: Wait for deploy to finish
        id: wait_deploy
        run: |
          # DEPLOY_ID is set in the previous step by writing to $GITHUB_ENV
          # It is available here as a normal environment variable $DEPLOY_ID
          DEPLOY_ID="$DEPLOY_ID"
          TIMEOUT=900
          INTERVAL=10
          ELAPSED=0
          echo "Waiting for deploy $DEPLOY_ID to finish (timeout ${TIMEOUT}s)"
          while [ $ELAPSED -lt $TIMEOUT ]; do
            DJSON=$(curl -s "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys/$DEPLOY_ID" -H "Authorization: Bearer $RENDER_API_KEY")
            echo "Raw API response: $DJSON"
            STATUS=$(echo "$DJSON" | jq -r '.deploy.status // .status // empty')
            echo "Deploy status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              DEPLOY_STATUS=succeeded
              echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT
              break
            fi
            if [ "$STATUS" = "deactivated" ] || [ "$STATUS" = "failed" ]; then
              DEPLOY_STATUS=failed
              echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT
              break
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ -z "${DEPLOY_STATUS:-}" ]; then
            DEPLOY_STATUS=timeout
            echo "deploy_status=$DEPLOY_STATUS" >> $GITHUB_OUTPUT
          fi

      - name: Health check (optional)
        id: healthcheck
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "No HEALTHCHECK_URL set; skipping HTTP health check"
            echo "health_ok=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Checking health endpoint: $HEALTHCHECK_URL"
          OK=0
          for i in 1 2 3 4 5; do
            if curl -sSf -m 10 "$HEALTHCHECK_URL" >/dev/null 2>&1; then
              OK=1
              break
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          if [ $OK -eq 1 ]; then
            echo "health_ok=true" >> $GITHUB_OUTPUT
          else
            echo "health_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Rollback on failure
        if: ${{ steps.wait_deploy.outputs.deploy_status != 'succeeded' || steps.healthcheck.outputs.health_ok == 'false' }}
        id: rollback
        run: |
          echo "Deployment failed or healthcheck failed — attempting rollback"
          echo "DEPLOY_ID = $DEPLOY_ID"
          DEPLOYS=$(curl -s -f "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys?limit=50" -H "Authorization: Bearer $RENDER_API_KEY") || { echo "curl failed"; exit 1; }
          PREV_ID=$(echo "$DEPLOYS" | jq -r --arg CUR "$DEPLOY_ID" '
            .[] | 
            ( (.deploy.id // .id) as $id | 
              (.deploy.status // .status) as $status |
              if $id != $CUR and ($status == "live" or $status == "deactivated") then $id else empty end
            )' | head -n1)
          if [ -z "$PREV_ID" ]; then
            echo "No previous successful deploy found; cannot rollback automatically"
            exit 1
          fi
          echo "Found previous successful deploy id: $PREV_ID — triggering rollback deploy"
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"previousDeployId\":\"$PREV_ID\"}")
          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -eq 202 ]; then
            echo "Rollback triggered successfully (HTTP 202)."
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "Rollback trigger failed with HTTP $HTTP_CODE"
            cat response.txt
            exit 1
          fi

      - name: Post-deploy failure summary
        if: ${{ (steps.wait_deploy.outputs.deploy_status != 'succeeded' || steps.healthcheck.outputs.health_ok == 'false') && steps.rollback.outputs.status != 'success' }}
        run: |
            echo " Deployment failed or healthcheck failed and rollback was not triggered. Check Render dashboard and logs."
            exit 1
          