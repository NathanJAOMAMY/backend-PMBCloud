
name: Deploy Backend

on:
  workflow_run:
    workflows: ["Node.js CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy (Render) — only after CI success
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') || github.event_name == 'workflow_dispatch' }}
    env:
      RENDER_BACKEND_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Render credentials
        run: |
          if [ -z "$RENDER_BACKEND_SERVICE_ID" ]; then
            echo " Missing RENDER_BACKEND_SERVICE_ID secret"
            exit 1
          fi
          if [ -z "$RENDER_API_KEY" ]; then
            echo " Missing RENDER_API_KEY secret"
            exit 1
          fi
          echo "✓ Render credentials configured"

      - name: Trigger deploy via Render API
        id: trigger
        run: |
          echo "Triggering deployment on Render for service $RENDER_BACKEND_SERVICE_ID..."
          RESPONSE=$(curl -s -X POST "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "response=$RESPONSE" >> $GITHUB_STEP_SUMMARY
          DEPLOY_ID=$(echo "$RESPONSE" | jq -r '.id // .deploy.id // empty')
          if [ -z "$DEPLOY_ID" ]; then
            echo " Failed to trigger deployment. Response:\n$RESPONSE"
            exit 1
          fi
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV
          echo "Triggered deploy id: $DEPLOY_ID"

      - name: Wait for deploy to finish
        id: wait_deploy
        run: |
          DEPLOY_ID="$DEPLOY_ID"
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0
          
          echo " Surveillance du déploiement $DEPLOY_ID"
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # ESSAYER DEUX FORMATS D'API DIFFÉRENTS
            
            # Format 1: L'API standard
            RESPONSE1=$(curl -s -w "\n%{http_code}" \
              "https://api.render.com/v1/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json")
            
            # Format 2: Via le service (peut-être le bon format)
            RESPONSE2=$(curl -s -w "\n%{http_code}" \
              "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys/$DEPLOY_ID" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json")
            
            HTTP_CODE1=$(echo "$RESPONSE1" | tail -n1)
            BODY1=$(echo "$RESPONSE1" | sed '$d')
            
            HTTP_CODE2=$(echo "$RESPONSE2" | tail -n1)
            BODY2=$(echo "$RESPONSE2" | sed '$d')
            
            # Essayer de parser la première réponse
            if [ "$HTTP_CODE1" = "200" ]; then
              if echo "$BODY1" | jq -e . >/dev/null 2>&1; then
                STATUS=$(echo "$BODY1" | jq -r '.status // .deploy.status // empty')
                echo " Format API 1: Status=$STATUS"
              else
                echo "  API 1: Réponse non-JSON"
              fi
            fi
            
            # Essayer la deuxième réponse
            if [ -z "${STATUS:-}" ] && [ "$HTTP_CODE2" = "200" ]; then
              if echo "$BODY2" | jq -e . >/dev/null 2>&1; then
                STATUS=$(echo "$BODY2" | jq -r '.status // .deploy.status // empty')
                echo " Format API 2: Status=$STATUS"
              else
                echo "  API 2: Réponse non-JSON"
              fi
            fi
            
            # Si toujours pas de status, essayer un parsing manuel
            if [ -z "${STATUS:-}" ]; then
              echo " Tentative de parsing manuel..."
              
              # Chercher le statut dans le HTML/texte
              ALL_RESPONSES="$BODY1$BODY2"
              STATUS=$(echo "$ALL_RESPONSES" | grep -o '"status":"[^"]*"' | cut -d'"' -f4 | head -1)
              
              if [ -z "$STATUS" ]; then
                STATUS=$(echo "$ALL_RESPONSES" | grep -o "'status':'[^']*'" | cut -d"'" -f4 | head -1)
              fi
              
              if [ -z "$STATUS" ]; then
                STATUS=$(echo "$ALL_RESPONSES" | grep -o '"state":"[^"]*"' | cut -d'"' -f4 | head -1)
              fi
            fi
            
            echo " Status détecté: ${STATUS:-non détecté}"
            
            # Logique de décision
            case "${STATUS:-}" in
              "succeeded"|"live"|"SUCCEEDED")
                echo " Déploiement réussi!"
                echo "deploy_status=succeeded" >> $GITHUB_OUTPUT
                break
                ;;
              "failed"|"FAILED"|"build_failed"|"canceled")
                echo " Déploiement échoué: $STATUS"
                echo "deploy_status=failed" >> $GITHUB_OUTPUT
                break
                ;;
              *)
                # Statuts en cours: building, pending, updating, etc.
                ;;
            esac
            
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            echo "  Écoulé: ${ELAPSED}s / ${TIMEOUT}s"
          done
          
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo " Timeout atteint"
            echo "deploy_status=timeout" >> $GITHUB_OUTPUT
          fi

      - name: Health check (optional)
        id: healthcheck
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "No HEALTHCHECK_URL set; skipping HTTP health check"
            echo "health_ok=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Checking health endpoint: $HEALTHCHECK_URL"
          OK=0
          for i in 1 2 3 4 5; do
            if curl -sSf -m 10 "$HEALTHCHECK_URL" >/dev/null 2>&1; then
              OK=1
              break
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          if [ $OK -eq 1 ]; then
            echo "health_ok=true" >> $GITHUB_OUTPUT
          else
            echo "health_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Rollback on failure
        if: ${{ steps.wait_deploy.outputs.deploy_status != 'succeeded' || steps.healthcheck.outputs.health_ok == 'false' }}
        run: |
          echo "Deployment failed or healthcheck failed — attempting rollback"
          PREV_ID=$(curl -s "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys?limit=10" -H "Authorization: Bearer $RENDER_API_KEY" | jq -r --arg CUR "$DEPLOY_ID" '.[] | select(.id != $CUR and .status=="succeeded") | .id' | head -n1)
          if [ -z "$PREV_ID" ]; then
            echo "No previous successful deploy found; cannot rollback automatically"
            exit 1
          fi
          echo "Found previous successful deploy id: $PREV_ID — triggering rollback deploy"
          RB_RESP=$(curl -s -X POST "https://api.render.com/v1/services/$RENDER_BACKEND_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"previous_deploy_id":"'$PREV_ID'"}')
          echo "Rollback response: $RB_RESP"
          RB_ID=$(echo "$RB_RESP" | jq -r '.id // .deploy.id // empty')
          if [ -z "$RB_ID" ]; then
            echo "Rollback trigger failed; manual intervention required"
            exit 1
          fi
          echo "Rollback deploy triggered: $RB_ID"

      - name: Post-deploy summary
        if: ${{ steps.wait_deploy.outputs.deploy_status == 'succeeded' && steps.healthcheck.outputs.health_ok != 'false' }}
        run: |
          echo " Deployment completed and health check OK"
          echo "Service: https://dashboard.render.com/services/$RENDER_BACKEND_SERVICE_ID"

      - name: Post-deploy failure summary
        if: ${{ steps.wait_deploy.outputs.deploy_status != 'succeeded' || steps.healthcheck.outputs.health_ok == 'false' }}
        run: |
          echo " Deployment failed or healthcheck failed. Check Render dashboard and logs."
          exit 1
