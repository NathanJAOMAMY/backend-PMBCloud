name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Audit dependencies
      run: npm audit --audit-level=high || true
    - name: Check for exposed secrets
      run: |
        # Cherche les patterns de secrets DANS LE CODE (pas dans .env)
        if grep -r "JWT_SECRET=" . --include="*.js" --include="*.json" --exclude-dir=node_modules; then
         echo " ERREUR: JWT_SECRET trouvé dans le code source"
         exit 1
        fi
        if grep -r "SUPABASE_KEY=eyJ" . --include="*.js" --include="*.json" --exclude-dir=node_modules; then
         echo " ERREUR: SUPABASE_KEY trouvé dans le code source"
         exit 1
        fi
        echo " Aucun secret exposé dans le code"
    - name: Validation project structure
      run: |
        # Simple vérification que app.js existe
        if [ ! -f "app.js" ]; then
          echo "ERREUR: app.js manquant"
          exit 1
        fi
        echo "app.js présent"
    - name: Test Docker build
      run: |
        docker build -t pmbcloud-test .
        echo "Docker build réussi"
    - name: Build Docker image
      run: docker build -t pmbcloud-backend .
    - name: Test health endpoint
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        MONGO_URI: ${{ secrets.MONGO_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
      run: |
        chmod +x test-health.sh
        ../test-health.sh http://localhost:3001/health