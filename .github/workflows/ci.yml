name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Validation project structure
      run: |
        # Simple vérification que app.js existe
        if [ ! -f "app.js" ]; then
          echo "ERREUR: app.js manquant"
          exit 1
        fi
        echo "app.js présent"
    - name: Test Docker build
      run: |
        docker build -t pmbcloud-test .
        echo "Docker build réussi"