name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Audit dependencies
      run: npm audit --audit-level=high || true
    - name: Check for exposed secrets
      run: |
        # Cherche les patterns de secrets DANS LE CODE (pas dans .env)
        if grep -r "JWT_SECRET=" . --include="*.js" --include="*.json" --exclude-dir=node_modules; then
         echo " ERREUR: JWT_SECRET trouvé dans le code source"
         exit 1
        fi
        if grep -r "SUPABASE_KEY=eyJ" . --include="*.js" --include="*.json" --exclude-dir=node_modules; then
         echo " ERREUR: SUPABASE_KEY trouvé dans le code source"
         exit 1
        fi
        echo " Aucun secret exposé dans le code"
    - name: Validation project structure
      run: |
        # Simple vérification que app.js existe
        if [ ! -f "app.js" ]; then
          echo "ERREUR: app.js manquant"
          exit 1
        fi
        echo "app.js présent"
    - name: Test Docker build
      run: |
        docker build -t pmbcloud-test .
        echo "Docker build réussi"
    - name: Build Docker image
      run: docker build -t pmbcloud-backend .
    - name: Test heatlh endpoint
      run: |
        docker run -d -p 3001:3001 --name pmbcloud-backend-test pmbcloud-backend
        sleep 10
        RESPONSE=$(curl --write-out "%{http_code}" --silent --output /dev/null http://localhost:3001/health)
        if [ "$RESPONSE" -ne 200 ]; then
          echo "ERREUR: Endpoint de santé non disponible"
          docker logs pmbcloud-backend-test
          docker rm -f pmbcloud-backend-test
          exit 1
        fi
        echo "Endpoint de santé OK"
        docker rm -f pmbcloud-backend-test